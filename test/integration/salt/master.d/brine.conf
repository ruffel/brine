interface: 0.0.0.0
auto_accept: True

file_roots:
  base:
    - /srv/salt

pillar_roots:
  base:
    - /srv/pillar

rest_cherrypy:
  host: 0.0.0.0
  port: 8000
  disable_ssl: True

netapi_enable_clients:
  - local
  - local_async
  - runner
  - runner_async
  - wheel
  - wheel_async

auth.pam.python: /usr/local/bin/python3

external_auth:
  pam:
    saltapi:
      - .*
      - '@runner'
      - '@wheel'
