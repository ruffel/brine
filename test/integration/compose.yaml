x-minion: &minion
  build:
    context: ./image
    args:
      SALT_VERSION: ${BRINE_SALT_VERSION:-3006.9}
  command: salt-minion -l info
  depends_on:
    salt-master:
      condition: service_healthy
  volumes:
    - ./salt/minion.d:/etc/salt/minion.d:ro

services:
  salt-master:
    build:
      context: ./image
      args:
        SALT_VERSION: ${BRINE_SALT_VERSION:-3006.9}
    hostname: salt-master
    container_name: brine-salt-master
    command: >
      bash -lc "salt-master -l info & exec salt-api -l info"
    ports:
      - "127.0.0.1:${BRINE_SALT_API_PORT:-8000}:8000"
    volumes:
      - ./salt/master.d:/etc/salt/master.d:ro
      - ./salt/states:/srv/salt:ro
      - ./salt/pillar:/srv/pillar:ro
      - ../../transports/python/brine_salt_bridge.py:/opt/brine/brine_salt_bridge.py:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f salt-master >/dev/null && pgrep -f salt-api >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  minion-1:
    <<: *minion
    hostname: minion-1

  minion-2:
    <<: *minion
    hostname: minion-2

  minion-3:
    <<: *minion
    hostname: minion-3
